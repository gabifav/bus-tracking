<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>445 Tracker</title>

  <link rel="stylesheet" href="style.css" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
</head>

<body>
  <header>
    <h1>445 Tracker</h1>
    <p>Campsie ↔ Balmain</p>
  </header>

  <section class="controls">
    <button onclick="showDirection('balmain')">To Balmain</button>
    <button onclick="showDirection('campsie')">To Campsie</button>
    <button onclick="findMe()">Find me</button>
  </section>

  <section class="info">
    <h2 id="status">Loading route 445...</h2>
    <p id="nextBus">Next bus: checking...</p>
  </section>

  <div id="map"></div>

  <footer>
    <p>Demo live tracker for route 445</p>
  </footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
